<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinkML-Scala playground</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="theme-color" content="#162037">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app-shell">

  <header class="app-header">
    <div class="brand">
      <svg class="brand-mark" viewBox="0 0 40 40" fill="none" aria-hidden="true">
        <circle cx="20" cy="8" r="4.5" stroke="var(--accent)" stroke-width="2.5"/>
        <circle cx="8" cy="30" r="4.5" stroke="var(--accent)" stroke-width="2.5"/>
        <circle cx="32" cy="30" r="4.5" stroke="var(--brand)" stroke-width="2.5" fill="var(--brand)"/>
        <path d="M17 11.5 10.5 26M23 11.5 29.5 26M12.5 30h15" stroke="var(--border)" stroke-width="2"/>
      </svg>
      <div class="brand-text">
        <span class="brand-title">LinkML-Scala</span>
        <span class="brand-sub">In-browser schema playground</span>
      </div>
    </div>
    <div class="header-actions">
      <a class="repo-link" href="https://github.com/NeverBlink-OSS/linkml-scala" target="_blank" rel="noopener" aria-label="linkml-scala on GitHub">
        <svg class="repo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91.5S18.73.15 16 2a13.38 13.38 0 0 0-7 0C6.27.15 5.09.5 5.09.5A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
        <span class="repo-meta">
          <span class="repo-name">linkml-scala</span>
          <span class="repo-stats" id="repoStats" hidden>
            <span class="repo-stat"><svg class="repo-stat-ic" viewBox="0 0 16 16" aria-hidden="true"><path d="M8 .25a.75.75 0 0 1 .673.418l1.882 3.815 4.21.612a.75.75 0 0 1 .416 1.279l-3.046 2.97.719 4.192a.75.75 0 0 1-1.088.791L8 12.347l-3.766 1.98a.75.75 0 0 1-1.088-.79l.72-4.194L.818 6.374a.75.75 0 0 1 .416-1.28l4.21-.611L7.327.668A.75.75 0 0 1 8 .25Z"/></svg><span id="repoStars">–</span></span>
            <span class="repo-stat"><svg class="repo-stat-ic" viewBox="0 0 16 16" aria-hidden="true"><path d="M5 5.372v.878c0 .414.336.75.75.75h4.5a.75.75 0 0 0 .75-.75v-.878a2.25 2.25 0 1 1 1.5 0v.878a2.25 2.25 0 0 1-2.25 2.25h-1.5v2.128a2.251 2.251 0 1 1-1.5 0V8.5h-1.5A2.25 2.25 0 0 1 3.5 6.25v-.878a2.25 2.25 0 1 1 1.5 0ZM5 3.25a.75.75 0 1 0-1.5 0 .75.75 0 0 0 1.5 0Zm6.75.75a.75.75 0 1 0 0-1.5.75.75 0 0 0 0 1.5Zm-3 8.75a.75.75 0 1 0-1.5 0 .75.75 0 0 0 1.5 0Z"/></svg><span id="repoForks">–</span></span>
          </span>
        </span>
      </a>
      <button id="themeToggle" class="icon-btn theme-toggle" title="Toggle theme" aria-label="Toggle theme">
        <svg id="themeIconMoon" class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg id="themeIconSun" class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" hidden><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66 4.93 19.07M19.07 4.93l-1.41 1.41"/></svg>
      </button>
    </div>
  </header>

  <main class="workspace">
    <div class="toolbar">
      <div class="target-tabs" id="targetTabs" role="tablist"></div>
      <div class="toolbar-right">
        <div class="options-row" id="optionsRow"></div>
        <label class="auto-toggle">
          <input type="checkbox" id="autoGenerate" checked>
          <span>Auto</span>
        </label>
        <button id="generateBtn" class="btn btn-primary">
          <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M13 2 3 14h7l-1 8 10-12h-7z"/></svg>
          Generate
        </button>
      </div>
    </div>

    <div class="split">
      <section class="panel panel-input">
        <div class="panel-head">
          <span class="panel-title">Input <span class="panel-title-sub">LinkML YAML</span></span>
          <div class="panel-actions">
            <button id="loadExample" class="btn btn-secondary btn-sm">Load example</button>
            <button id="clearInput" class="btn btn-secondary btn-sm">Clear</button>
          </div>
        </div>
        <div id="inputEditor" class="editor"></div>
      </section>

      <section class="panel panel-output">
        <div class="panel-head">
          <span class="panel-title">Output</span>
          <div class="panel-actions">
            <span id="statusPill" class="status-pill" hidden></span>
            <button id="copyOutput" class="btn btn-secondary btn-sm">Copy</button>
          </div>
        </div>
        <div id="fileTabs" class="file-tabs" hidden></div>
        <div id="outputEditor" class="editor editor--output"></div>
      </section>
    </div>
  </main>

  <footer class="app-footer">
    <a class="footer-brand" href="https://neverblink.eu" target="_blank" rel="noopener" aria-label="Built by NeverBlink">
      <span class="footer-built">Built by</span>
      <span class="footer-logo" aria-hidden="true"></span>
    </a>
    <nav class="footer-links">
      <a href="https://github.com/NeverBlink-OSS/linkml-scala/blob/main/LICENSE" target="_blank" rel="noopener">Apache-2.0</a>
      <a href="https://github.com/NeverBlink-OSS/linkml-scala" target="_blank" rel="noopener">GitHub</a>
      <a href="https://www.npmjs.com/package/@neverblink/linkml" target="_blank" rel="noopener">npm</a>
      <a href="https://central.sonatype.com/namespace/eu.neverblink.linkml" target="_blank" rel="noopener">Maven Central</a>
    </nav>
  </footer>
</div>

<script type="module" src="dist/app.js"></script>
</body>
</html>
