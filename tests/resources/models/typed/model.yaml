id: https://neverblink.eu/linkml/tests/typed/
name: typed
imports:
  - linkml:types

classes:
  Typed:
    tree_root: true
    slots:
      - stringSlot
      - booleanSlot
      - intSlot
      - floatSlot
      - dateSlot
      - customSlot

types:
  custom:
    name: custom
    uri: https://neverblink.eu/linkml/tests/typed/Custom
    base: str

slots:
  stringSlot:
    range: string
    required: true
  booleanSlot:
    range: boolean
    required: true
  intSlot:
    range: integer
    required: true
  floatSlot:
    range: decimal
    required: true
  dateSlot:
    range: date
    required: true
  customSlot:
    range: custom
    required: true
