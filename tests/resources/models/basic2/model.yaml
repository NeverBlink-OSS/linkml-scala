id: https://neverblink.eu/linkml/tests/basic2/
name: basic2
comments:
  - The two classes here are not linked with each other

instantiates:
  - https://neverblink.eu/linkml/tests/Metadata
extensions:
  derived_equals: basic

imports:
  - linkml:types

classes:
  SomeOtherClass:
    slots:
      - some_slot
  SomeClass:
    tree_root: true
    slots:
      - some_slot
      - some_other_slot
slots:
  some_slot:
    rank: 1
    range: string
  some_other_slot:
    rank: 2
    range: integer
    required: true