id: https://neverblink.eu/linkml/tests/aliases/
name: aliases
prefixes:
  aliases: https://neverblink.eu/linkml/tests/aliases/

imports:
  - linkml:types

classes:
  SomeOtherClass:
    tree_root: true
    alias: AliasedClass
    class_uri: aliases:UriClass
    attributes:
      some_slot:
        rank: 1
        alias: aliased_slot
      some_other_slot:
        rank: 2
        slot_uri: aliases:uri_slot
