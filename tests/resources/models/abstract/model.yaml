id: https://neverblink.eu/linkml/tests/abstract/
name: abstract

imports:
  - linkml:types

classes:
  SomeClass:
    tree_root: true
    abstract: true
    slots:
      - some_slot
      - some_other_slot
slots:
  some_slot:
    rank: 1
    range: string
  some_other_slot:
    rank: 2
    range: integer
    required: true