id: https://neverblink.eu/linkml/tests/implicitInlineAsSimpleDict/
name: implicitInlineAsSimpleDict

imports:
  - linkml:types

classes:
  SomeOtherClass:
    attributes:
      id:
        # key is not an identifier - it can be used as a dict key, but not as a reference value
        key: true
      other_slot:
  SomeClass:
    tree_root: true
    slots:
      - some_slot
slots:
  some_slot:
    range: SomeOtherClass
    multivalued: true