id: https://neverblink.eu/linkml/tests/explicitInlineImplicitlyAsCompactDict/
name: explicitInlineImplicitlyAsCompactDict
prefixes:
  linkml: https://w3id.org/linkml/

imports:
  - linkml:types

classes:
  SomeOtherClass:
    attributes:
      id:
        identifier: true
  SomeClass:
    tree_root: true
    slots:
      - some_slot
slots:
  some_slot:
    range: SomeOtherClass
    multivalued: true
    inlined: true