id: https://neverblink.eu/linkml/tests/multivaluedReference/
name: multivaluedReference
default_curi_maps:
    - semweb_context
imports:
  - linkml:types

classes:
  SomeOtherClass:
    attributes:
      id:
        identifier: true
  SomeClass:
    tree_root: true
    slots:
      - some_slot
slots:
  some_slot:
    multivalued: true
    range: SomeOtherClass