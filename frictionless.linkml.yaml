id: https://specs.frictionlessdata.io/table-schema/
name: TableSchema

imports:
  - linkml:types

classes:
  TableDescriptor:
    tree_root: true
    attributes:
      fields:
        range: FieldDescriptor
        required: true
        multivalued: true
        inlined: true
        inlined_as_list: true
      primaryKey:
        range: string
        multivalued: true
        description: A primary key is a field name or an array of field names, whose values MUST uniquely identify each row in the table.
      foreignKeys:
        range: ForeignKey
        multivalued: true
        inlined: true
        inlined_as_list: true
        description: An array of Table Schema Foreign Key objects.
      missingValues:
        range: string
        multivalued: true
        description: Values that when encountered in the source, should be considered as null.

  ForeignKey:
    attributes:
      fields:
        range: string
        multivalued: true
        required: true
        description: The field or fields on this resource that form the source part of the foreign key.
      reference:
        range: ForeignKeyReference
        required: true
        inlined: true
        description: The reference object for this foreign key.

  ForeignKeyReference:
    attributes:
      resource:
        range: string
        required: true
        description: The name of the resource within the data package. Use empty string for self-referencing foreign keys.
      fields:
        range: string
        multivalued: true
        required: true
        description: The field or fields on the destination resource.

  Constraints:
    attributes:
      required:
        range: boolean
        description: Indicates whether a property must have a value for each instance.
      unique:
        range: boolean
        description: When true, each value for the property MUST be unique.
      minLength:
        range: integer
        description: An integer that specifies the minimum length of a value.
      maxLength:
        range: integer
        description: An integer that specifies the maximum length of a value.
      minimum:
        range: string
        description: Specifies a minimum value for a field. This is different to minLength which checks the number of items in the value.
      maximum:
        range: string
        description: Specifies a maximum value for a field.
      pattern:
        range: string
        description: A regular expression that can be used to test field values. Values MUST conform to the standard XML Schema regular expression syntax.
      enum:
        range: string
        multivalued: true
        description: The value of the field must exactly match a value in the enum array.

  FieldDescriptor:
    abstract: true
    attributes:
      name:
        description: >
          The field descriptor MUST contain a name property.
          This property SHOULD correspond to the name of field/column in the data file (if it has a name).
          As such it SHOULD be unique (though it is possible, but very bad practice, for the data file to have multiple columns with the same name).
          name SHOULD NOT be considered case sensitive in determining uniqueness.
          However, since it should correspond to the name of the field in the data file it may be important to preserve case.
        required: true
        range: string
      title:
        description: A human readable label or title for the field
        range: string
      description:
        description: A description for this field e.g. "The recipient of the funds"
        range: string
      example:
        description: An example value for the field
        range: string
      type:
        range: string
        ifabsent: string
      rdfType:
        range: string
        description: The RDF type for this field.
      constraints:
        range: Constraints
        inlined: true

  StringField:
    is_a: FieldDescriptor
    attributes:
      format:
        range: StringFormat
        ifabsent: default

  NumberField:
    is_a: FieldDescriptor
    attributes:
      format:
        range: DefaultFormat
        ifabsent: default
      decimalChar:
        range: string
        description: A string whose value is used to represent a decimal point within the number. The default value is ".".
      groupChar:
        range: string
        description: A string whose value is used to group digits within the number. The default value is null.
      bareNumber:
        range: boolean
        description: If true the physical contents of this field must follow the formatting constraints already set out.

  IntegerField:
    is_a: FieldDescriptor
    attributes:
      format:
        range: DefaultFormat
        ifabsent: default
      bareNumber:
        range: boolean
        description: If true the physical contents of this field must follow the formatting constraints already set out.

  BooleanField:
    is_a: FieldDescriptor
    attributes:
      format:
        range: DefaultFormat
        ifabsent: default
      trueValues:
        range: string
        multivalued: true
        description: String values that should be cast to true. Defaults to ["true", "True", "TRUE", "1"].
      falseValues:
        range: string
        multivalued: true
        description: String values that should be cast to false. Defaults to ["false", "False", "FALSE", "0"].

  DateField:
    is_a: FieldDescriptor
    attributes:
      format:
        range: string
        description: "Date format: default (ISO8601 YYYY-MM-DD), any, or a strptime pattern."
        ifabsent: default

  TimeField:
    is_a: FieldDescriptor
    attributes:
      format:
        range: string
        description: "Time format: default (ISO8601 hh:mm:ss), any, or a strptime pattern."
        ifabsent: default

  DateTimeField:
    is_a: FieldDescriptor
    attributes:
      format:
        range: string
        description: "Datetime format: default (ISO8601 YYYY-MM-DDThh:mm:ssZ), any, or a strptime pattern."
        ifabsent: default

  YearField:
    is_a: FieldDescriptor
    attributes:
      format:
        range: DefaultFormat
        ifabsent: default

  YearMonthField:
    is_a: FieldDescriptor
    attributes:
      format:
        range: DefaultFormat
        ifabsent: default

  ObjectField:
    is_a: FieldDescriptor
    attributes:
      format:
        range: DefaultFormat
        ifabsent: default

  ArrayField:
    is_a: FieldDescriptor
    attributes:
      format:
        range: DefaultFormat
        ifabsent: default

  DurationField:
    is_a: FieldDescriptor
    attributes:
      format:
        range: DefaultFormat
        ifabsent: default

  GeoPointField:
    is_a: FieldDescriptor
    attributes:
      format:
        range: GeoPointFormat
        ifabsent: default

  GeoJsonField:
    is_a: FieldDescriptor
    attributes:
      format:
        range: GeoJsonFormat
        ifabsent: default

  AnyField:
    is_a: FieldDescriptor

enums:
  StringFormat:
    permissible_values:
      default:
        description: Any valid string.
      email:
        description: A valid email address.
      uri:
        description: A valid URI.
      binary:
        description: A base64 encoded string representing binary data.
      uuid:
        description: A string that is a uuid.

  DefaultFormat:
    permissible_values:
      default:
        description: The default format.

  GeoPointFormat:
    permissible_values:
      default:
        description: A string of the pattern 'lon, lat', where lon is the longitude and lat is the latitude.
      array:
        description: An array of exactly two items, where the first item is lon and the second item is lat.
      object:
        description: A JSON object with exactly two keys, lat and lon.

  GeoJsonFormat:
    permissible_values:
      default:
        description: A geojson object as per the GeoJSON spec.
      topojson:
        description: A topojson object as per the TopoJSON spec.
